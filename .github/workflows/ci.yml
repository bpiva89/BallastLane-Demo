name: CI Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Build & Test .NET Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore backend/src/BallastLane.ProductManagement.sln

    - name: Build solution
      run: dotnet build backend/src/BallastLane.ProductManagement.sln --no-restore --configuration Release

    - name: Run tests
      run: dotnet test backend/src/BallastLane.ProductManagement.sln --no-build --configuration Release

  frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm install

    - name: Build Angular app
      working-directory: frontend
      run: npm run build
