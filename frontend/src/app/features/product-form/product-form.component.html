<h2 mat-dialog-title>{{ isEdit ? 'Edit Product' : 'New Product' }}</h2>

<mat-dialog-content>
  <form #productForm="ngForm" class="product-form">
    <mat-form-field appearance="outline" class="product-form--field">
      <mat-label>Name</mat-label>
      <input matInput [(ngModel)]="name" name="name" required maxlength="200" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="product-form--field">
      <mat-label>Description</mat-label>
      <textarea matInput [(ngModel)]="description" name="description" required maxlength="1000" rows="3"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="product-form--field">
      <mat-label>Price</mat-label>
      <input matInput type="number" [(ngModel)]="price" name="price" required min="0.01" step="0.01" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="product-form--field">
      <mat-label>Stock</mat-label>
      <input matInput type="number" [(ngModel)]="stock" name="stock" required min="0" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-stroked-button (click)="onSave()" [disabled]="!name || !description || price === null || stock === null">
    {{ isEdit ? 'Update' : 'Create' }}
  </button>
</mat-dialog-actions>
