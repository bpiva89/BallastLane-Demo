<main class="auth">
  <section class="auth--card">
    <h1>Register</h1>
    <p class="auth--subtitle">Product Management</p>

    @if (errorMessage) {
      <div class="auth--error">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <mat-form-field appearance="outline" class="auth--field">
        <mat-label>Username</mat-label>
        <input matInput [(ngModel)]="username" name="username" required autocomplete="username" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="auth--field">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="auth--field">
        <mat-label>Password</mat-label>
        <input matInput type="password" [(ngModel)]="password" name="password" required minlength="6" autocomplete="new-password" />
      </mat-form-field>

      <button mat-stroked-button type="submit" [disabled]="isLoading || !registerForm.valid">
        @if (isLoading) {
          <mat-spinner diameter="18"></mat-spinner>
        } @else {
          Register
        }
      </button>
    </form>

    <p class="auth--link">Already have an account? <a routerLink="/login">Sign in</a></p>
  </section>
</main>
