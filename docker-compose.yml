services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ballastlane-mssql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Passw0rd"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' -C -N || exit 1"]
      interval: 10s
      retries: 10
      start_period: 30s

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ballastlane-mssql-init
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./backend/db:/db
    command: >
      bash -c "/opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P 'YourStrong@Passw0rd' -i /db/init.sql -C -N"
    restart: on-failure

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ballastlane-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=mssql;Database=BallastLaneDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
    depends_on:
      mssql-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ballastlane-frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  mssql_data:
